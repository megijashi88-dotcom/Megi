<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event Name</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  color:#1f3d2b;
}

section {
  padding:60px 20px;
  text-align:center;
}

.hero {
  background:#eae6dc;
  padding:100px 20px;
}

h1 {
  font-size:42px;
  margin-bottom:10px;
}

h2 {
  margin-bottom:20px;
}

.btn {
  background:#1f3d2b;
  color:white;
  padding:15px 30px;
  border:none;
  border-radius:30px;
  cursor:pointer;
}

.cards {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
}

.card {
  background:white;
  padding:20px;
  border-radius:15px;
  width:250px;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.cta {
  background:#1f3d2b;
  color:white;
}

.footer {
  font-size:14px;
  opacity:0.6;
}
</style>
</head>

<body>

<section class="hero">
  <h1>Bloom Wellness Fest</h1>
  <p>July 20 | Tbilisi</p>
  <button class="btn">Register Now</button>
</section>

<section>
  <h2>About the Event</h2>
  <p>Experience a unique blend of wellness, relaxation, and lifestyle activities.</p>
</section>

<section>
  <h2>Program Highlights</h2>
  <div class="cards">
    <div class="card">Spa & Relaxation</div>
    <div class="card">Workshops</div>
    <div class="card">Live Music</div>
  </div>
</section>

<section>
  <h2>Our Partners</h2>
  <p>Logos here</p>
</section>

<section class="cta">
  <h2>Join Us</h2>
  <button class="btn">Get Ticket</button>
</section>

<section class="footer">
  © 2026 Your Brand
</section>

</body>
</html>
